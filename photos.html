<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Manager – Makeover By Vishva</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--cream); }

    /* Same sidebar as admin */
    .admin-layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px; background: var(--brown-dark);
      position: fixed; top: 0; left: 0; height: 100vh;
      display: flex; flex-direction: column; z-index: 200;
      transition: transform 0.3s ease; overflow-y: auto;
    }
    .sidebar-logo { padding: 1.5rem; border-bottom: 1px solid rgba(201,150,90,0.15); }
    .sidebar-logo a { font-family:'Italiana',serif; font-size:1.3rem; color:var(--cream); text-decoration:none; display:block; }
    .sidebar-logo a span { color:var(--gold-light); }
    .sidebar-logo .admin-badge { display:inline-block; margin-top:0.4rem; background:var(--gold); color:white; font-size:0.6rem; padding:0.15rem 0.6rem; border-radius:10px; letter-spacing:0.1em; text-transform:uppercase; font-family:'Jost',sans-serif; }
    .sidebar-nav { padding: 1rem 0; flex: 1; }
    .sidebar-nav a { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1.5rem; color:rgba(245,237,227,0.6); text-decoration:none; font-size:0.82rem; letter-spacing:0.05em; transition:all 0.2s; border-left:3px solid transparent; }
    .sidebar-nav a .nav-icon { font-size:1rem; width:20px; text-align:center; }
    .sidebar-nav a:hover { color:var(--cream); background:rgba(255,255,255,0.05); }
    .sidebar-nav a.active { color:var(--gold-light); background:rgba(201,150,90,0.1); border-left-color:var(--gold); }
    .sidebar-divider { height:1px; background:rgba(201,150,90,0.1); margin:0.75rem 1.5rem; }
    .sidebar-footer { padding:1rem 1.5rem; border-top:1px solid rgba(201,150,90,0.1); }
    .sidebar-footer a { display:flex; align-items:center; gap:0.6rem; color:rgba(245,237,227,0.4); font-size:0.78rem; text-decoration:none; transition:color 0.2s; }
    .sidebar-footer a:hover { color:var(--gold-light); }

    .main-content { margin-left:240px; flex:1; }
    .topbar { background:var(--white); padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; border-bottom:1.5px solid var(--cream-dark); position:sticky; top:0; z-index:100; gap:1rem; }
    .topbar-title { font-family:'Cormorant Garamond',serif; font-size:1.3rem; color:var(--brown-dark); }
    .menu-toggle-btn { display:none; background:none; border:none; font-size:1.4rem; cursor:pointer; padding:0.2rem; color:var(--brown-dark); }

    .page-content { padding: 2rem; max-width: 1000px; }

    .upload-section {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 2rem;
      border: 1.5px solid var(--cream-dark);
      box-shadow: 0 2px 15px var(--shadow);
      margin-bottom: 2rem;
    }
    .upload-section h3 {
      font-family: 'Cormorant Garamond',serif;
      font-size: 1.3rem; color: var(--brown-dark);
      margin-bottom: 1.5rem;
    }

    .upload-zone {
      border: 2.5px dashed var(--cream-mid);
      border-radius: var(--radius);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: var(--cream);
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--gold);
      background: rgba(201,150,90,0.04);
    }
    .upload-zone .up-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
    .upload-zone h4 { color: var(--brown-dark); font-size: 1.05rem; margin-bottom: 0.4rem; }
    .upload-zone p { color: var(--text-mid); font-size: 0.82rem; }
    .upload-zone .browse-btn {
      display: inline-block; margin-top: 1rem;
      padding: 0.6rem 1.5rem; background: var(--gold);
      color: white; border-radius: 30px;
      font-size: 0.8rem; font-family: 'Jost',sans-serif;
      letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s;
    }
    .upload-zone .browse-btn:hover { background: var(--gold-light); }
    #fileInput { display: none; }

    /* Upload form */
    .upload-form { margin-top: 1.5rem; display: none; }
    .upload-form.visible { display: block; }

    .preview-strip {
      display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem;
    }
    .preview-item {
      position: relative; width: 100px; height: 100px;
      border-radius: var(--radius-sm); overflow: hidden;
      border: 2px solid var(--cream-dark);
    }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-item .remove-preview {
      position: absolute; top: 3px; right: 3px;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0,0,0,0.6); border: none;
      color: white; font-size: 0.75rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-item .file-name {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.6); color: white;
      font-size: 0.55rem; padding: 0.2rem 0.3rem;
      text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media(max-width:600px){ .form-grid { grid-template-columns: 1fr; } }

    .progress-bar { height: 6px; background: var(--cream-dark); border-radius: 3px; overflow: hidden; margin-top: 0.75rem; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius: 3px; transition: width 0.4s ease; width: 0%; }
    .progress-label { font-size: 0.75rem; color: var(--text-mid); margin-top: 0.4rem; text-align: center; }

    /* Gallery grid */
    .gallery-section {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 1.5rem 2rem;
      border: 1.5px solid var(--cream-dark);
      box-shadow: 0 2px 15px var(--shadow);
    }
    .gallery-section-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.2rem; flex-wrap: wrap; gap: 0.5rem;
    }
    .gallery-section-head h3 { font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:var(--brown-dark); }
    .gallery-section-head span { font-size:0.78rem; color:var(--text-mid); }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }
    @media(max-width:500px){ .photo-grid { grid-template-columns: repeat(2,1fr); } }

    .photo-card {
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--cream-dark);
      border: 1.5px solid var(--cream-dark);
      transition: all 0.3s;
      position: relative;
    }
    .photo-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px var(--shadow-md); }
    .photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .photo-card-info {
      padding: 0.6rem 0.7rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.3rem;
    }
    .photo-card-info .photo-title { font-size: 0.72rem; color: var(--brown-dark); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .photo-card-info .photo-cat { font-size: 0.62rem; background: var(--cream); color: var(--text-mid); padding: 0.12rem 0.4rem; border-radius: 8px; white-space: nowrap; }
    .photo-del-btn {
      position: absolute; top: 0.4rem; right: 0.4rem;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(0,0,0,0.65); border: none; color: white;
      font-size: 0.75rem; display: flex; align-items: center;
      justify-content: center; cursor: pointer; opacity: 0;
      transition: opacity 0.2s;
    }
    .photo-card:hover .photo-del-btn { opacity: 1; }
    .photo-del-btn:hover { background: #dc2626; }

    /* Category filter */
    .cat-filter { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .cat-btn { padding:0.3rem 0.8rem; border-radius:20px; font-size:0.72rem; font-family:'Jost',sans-serif; cursor:pointer; border:1.5px solid var(--cream-dark); background:none; color:var(--text-mid); transition:all 0.2s; }
    .cat-btn.active { background:var(--brown-dark); color:var(--cream); border-color:var(--brown-dark); }

    /* Mobile */
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:150; backdrop-filter:blur(2px); }
    @media(max-width:860px){
      .sidebar { transform:translateX(-100%); }
      .sidebar.open { transform:translateX(0); }
      .sidebar-overlay { display:block; }
      .sidebar-overlay.hidden { display:none; }
      .main-content { margin-left:0; }
      .menu-toggle-btn { display:block; }
    }
  </style>
</head>
<body>

<div class="sidebar-overlay hidden" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <a href="/admin">Makeover <span>By Vishva</span></a>
    <span class="admin-badge">Admin Panel</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/admin"><span class="nav-icon">📊</span> Dashboard</a>
    <a href="/admin/bookings"><span class="nav-icon">📅</span> Bookings</a>
    <a href="/admin/messages"><span class="nav-icon">💬</span> Messages</a>
    <div class="sidebar-divider"></div>
    <a href="/photos" class="active"><span class="nav-icon">🖼️</span> Photo Manager</a>
    <a href="/gallery" target="_blank"><span class="nav-icon">✨</span> View Gallery</a>
    <div class="sidebar-divider"></div>
    <a href="/" target="_blank"><span class="nav-icon">🌐</span> View Website</a>
  </nav>
  <div class="sidebar-footer"><a href="/admin">← Dashboard</a></div>
</aside>

<div class="main-content">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:1rem;">
      <button class="menu-toggle-btn" onclick="toggleSidebar()">☰</button>
      <div class="topbar-title">Photo Manager</div>
    </div>
    <div style="display:flex;gap:0.75rem;align-items:center;">
      <span id="photoCount" style="font-size:0.78rem;color:var(--text-mid);"></span>
      <a href="/gallery" target="_blank" style="font-size:0.78rem;color:var(--gold);text-decoration:none;">View Gallery ↗</a>
    </div>
  </div>

  <div class="page-content">

    <!-- Upload Section -->
    <div class="upload-section">
      <h3>📤 Upload New Photos</h3>

      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple />
        <span class="up-icon">🖼️</span>
        <h4>Drag & Drop photos here</h4>
        <p>Supports JPG, PNG, WebP — max 15MB per image</p>
        <span class="browse-btn" onclick="document.getElementById('fileInput').click()">Browse Files</span>
      </div>

      <div class="upload-form" id="uploadForm">
        <div class="preview-strip" id="previewStrip"></div>

        <div class="form-grid">
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="uploadTitle" placeholder="e.g. Bridal Makeup Look" />
          </div>
          <div class="form-group">
            <label>Category *</label>
            <select id="uploadCategory">
              <option value="general">General</option>
              <option value="facial">Facial &amp; Skincare</option>
              <option value="hair">Hair</option>
              <option value="makeup">Makeup</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Description (optional)</label>
          <textarea id="uploadDesc" placeholder="Brief description..." style="height:80px;"></textarea>
        </div>

        <div class="progress-bar" id="progressBar" style="display:none;">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-label" id="progressLabel"></div>

        <div style="display:flex;gap:0.75rem;margin-top:1rem;flex-wrap:wrap;">
          <button class="btn-primary" id="uploadBtn" onclick="uploadFiles()">Upload Photos</button>
          <button onclick="clearUpload()" style="padding:0.7rem 1.5rem;border-radius:30px;border:1.5px solid var(--cream-dark);background:none;color:var(--text-mid);font-family:'Jost',sans-serif;font-size:0.82rem;cursor:pointer;">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Gallery Manager -->
    <div class="gallery-section">
      <div class="gallery-section-head">
        <h3>🗂️ Gallery Photos</h3>
        <span id="galleryCount">Loading...</span>
      </div>

      <div class="cat-filter">
        <button class="cat-btn active" data-cat="all" onclick="filterCat('all',this)">All</button>
        <button class="cat-btn" data-cat="facial" onclick="filterCat('facial',this)">Facial</button>
        <button class="cat-btn" data-cat="hair" onclick="filterCat('hair',this)">Hair</button>
        <button class="cat-btn" data-cat="makeup" onclick="filterCat('makeup',this)">Makeup</button>
        <button class="cat-btn" data-cat="general" onclick="filterCat('general',this)">General</button>
      </div>

      <div class="photo-grid" id="photoGrid">
        <div class="loading" style="grid-column:1/-1;"><div class="spinner"></div></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let selectedFiles = [];
let allPhotos = [];
let currentCat = 'all';

function escHtml(s) { if(!s)return''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg, isError=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(isError?' error':'');
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),4000);
}

// ── SIDEBAR ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('hidden');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.add('hidden');
}

// ── DRAG & DROP ──
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', (e) => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  handleFiles(Array.from(e.dataTransfer.files));
});
document.getElementById('fileInput').addEventListener('change', (e) => {
  handleFiles(Array.from(e.target.files));
});

function handleFiles(files) {
  const valid = files.filter(f => f.type.startsWith('image/') && f.size < 15 * 1024 * 1024);
  if (valid.length < files.length) showToast(`${files.length - valid.length} file(s) skipped (too large or wrong format)`, true);
  if (!valid.length) return;

  selectedFiles = [...selectedFiles, ...valid];
  renderPreviews();
  document.getElementById('uploadForm').classList.add('visible');
}

function renderPreviews() {
  const strip = document.getElementById('previewStrip');
  strip.innerHTML = selectedFiles.map((f, i) => `
    <div class="preview-item" id="prev-${i}">
      <img src="${URL.createObjectURL(f)}" alt="${escHtml(f.name)}" />
      <span class="file-name">${escHtml(f.name)}</span>
      <button class="remove-preview" onclick="removeFile(${i})">×</button>
    </div>
  `).join('');
}

function removeFile(i) {
  selectedFiles.splice(i, 1);
  if (!selectedFiles.length) clearUpload();
  else renderPreviews();
}

function clearUpload() {
  selectedFiles = [];
  document.getElementById('fileInput').value = '';
  document.getElementById('uploadForm').classList.remove('visible');
  document.getElementById('previewStrip').innerHTML = '';
  document.getElementById('uploadTitle').value = '';
  document.getElementById('uploadDesc').value = '';
  setProgress(0, '');
}

function setProgress(pct, label) {
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  const lbl = document.getElementById('progressLabel');
  bar.style.display = pct > 0 ? 'block' : 'none';
  fill.style.width = pct + '%';
  lbl.textContent = label;
}

async function uploadFiles() {
  if (!selectedFiles.length) return;

  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.textContent = 'Uploading...';

  const title = document.getElementById('uploadTitle').value.trim();
  const category = document.getElementById('uploadCategory').value;
  const description = document.getElementById('uploadDesc').value.trim();

  let uploaded = 0;
  const errors = [];

  for (let i = 0; i < selectedFiles.length; i++) {
    const file = selectedFiles[i];
    setProgress(Math.round((i / selectedFiles.length) * 100), `Uploading ${i+1} of ${selectedFiles.length}...`);

    try {
      const base64 = await fileToBase64(file);
      const res = await fetch('/api/gallery/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: title || file.name.replace(/\.[^.]+$/, ''),
          description,
          image_data: base64,
          image_type: file.type,
          category
        })
      });
      const r = await res.json();
      if (r.success) uploaded++;
      else errors.push(file.name);
    } catch {
      errors.push(file.name);
    }
  }

  setProgress(100, `Done! ${uploaded} uploaded${errors.length ? `, ${errors.length} failed` : ''}`);

  if (uploaded > 0) {
    showToast(`✨ ${uploaded} photo${uploaded > 1 ? 's' : ''} uploaded successfully!`);
    setTimeout(() => {
      clearUpload();
      loadGallery();
    }, 1500);
  } else {
    showToast('Upload failed. Please try again.', true);
  }

  btn.disabled = false;
  btn.textContent = 'Upload Photos';
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── GALLERY ──
async function loadGallery() {
  const grid = document.getElementById('photoGrid');
  try {
    const res = await fetch('/api/gallery');
    allPhotos = await res.json();
    document.getElementById('galleryCount').textContent = `${allPhotos.length} photo${allPhotos.length !== 1 ? 's' : ''}`;
    document.getElementById('photoCount').textContent = `${allPhotos.length} photos`;
    renderGallery();
  } catch {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-mid);padding:2rem;">Failed to load gallery.</div>';
  }
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

function renderGallery() {
  const grid = document.getElementById('photoGrid');
  const filtered = currentCat === 'all' ? allPhotos : allPhotos.filter(p => p.category === currentCat);

  if (!filtered.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--text-mid);padding:3rem;">
      <div style="font-size:2.5rem;margin-bottom:0.75rem;">🌸</div>
      <p>No photos in this category yet.</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="photo-card" id="photo-${p.id}">
      <img src="/api/gallery/${p.id}/image" alt="${escHtml(p.title)}" loading="lazy" />
      <button class="photo-del-btn" onclick="deletePhoto(${p.id})" title="Delete">🗑</button>
      <div class="photo-card-info">
        <span class="photo-title">${escHtml(p.title)}</span>
        <span class="photo-cat">${escHtml(p.category)}</span>
      </div>
    </div>
  `).join('');
}

async function deletePhoto(id) {
  if (!confirm('Delete this photo permanently?')) return;
  try {
    const res = await fetch(`/api/gallery/${id}`, { method: 'DELETE' });
    const r = await res.json();
    if (r.success) {
      document.getElementById(`photo-${id}`)?.remove();
      allPhotos = allPhotos.filter(p => p.id !== id);
      document.getElementById('galleryCount').textContent = `${allPhotos.length} photo${allPhotos.length !== 1 ? 's' : ''}`;
      document.getElementById('photoCount').textContent = `${allPhotos.length} photos`;
      showToast('Photo deleted.');
    }
  } catch { showToast('Failed to delete.', true); }
}

loadGallery();
</script>
</body>
</html>
